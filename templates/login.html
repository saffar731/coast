<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #050507; color: white; }</style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="bg-white/5 border border-white/10 p-10 rounded-[2.5rem] w-full max-w-md text-center">
        <h1 class="text-3xl font-black mb-8 italic">COASTAL<span class="text-blue-500">DRIED</span></h1>
        <input type="email" id="email" placeholder="Gmail Address" class="w-full p-4 mb-4 bg-black rounded-xl outline-none border border-white/5">
        <input type="password" id="pass" placeholder="Password" class="w-full p-4 mb-8 bg-black rounded-xl outline-none border border-white/5">
        <button onclick="login()" class="w-full bg-blue-600 py-4 rounded-xl font-bold tracking-widest">ENTER STORE</button>
    </div>
    <script>
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            fetch('/api/login/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password})
            })
            .then(res => res.json())
            .then(data => window.location.href = `/store/${data.url_id}/`);
        }
    </script>
</body>
</html>
